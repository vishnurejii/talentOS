version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: talentos-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  postgres:
    image: postgres:16
    container_name: talentos-postgres
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: talentos-redis
    ports:
      - "6379:6379"
    restart: always

  minio:
    image: minio/minio
    container_name: talentos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  judge0:
    image: judge0/judge0:1.13.1
    container_name: talentos-judge0
    privileged: true
    volumes:
      - ./judge0-conf:/judge0
    ports:
      - "2358:2358"
    environment:
      - REDIS_PASSWORD=
      - REDIS_HOST=redis
      - DB_USER=judge0
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - DB_NAME=judge0
      - DB_TEST_NAME=judge0_test
      - DB_PORT=5432
    depends_on:
      - redis
      - postgres
    restart: always
  
  judge0-worker:
    image: judge0/judge0:1.13.1
    container_name: talentos-judge0-worker
    command: ["./scripts/workers"]
    privileged: true
    environment:
      - REDIS_PASSWORD=
      - REDIS_HOST=redis
      - DB_USER=judge0
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - DB_NAME=judge0
      - DB_TEST_NAME=judge0_test
      - DB_PORT=5432
    volumes:
      - ./judge0-conf:/judge0
    depends_on:
      - judge0
      - redis
      - postgres
    restart: always

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentos-django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./shared_models:/app/models
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    restart: always

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentos-celery
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
      - ./shared_models:/app/models
    env_file:
      - .env
    depends_on:
      - django
      - redis
    restart: always

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentos-celery-beat
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
      - ./shared_models:/app/models
    env_file:
      - .env
    depends_on:
      - django
      - redis
    restart: always

  fastapi_ai:
    build:
      context: ./ai_services
      dockerfile: Dockerfile
    container_name: talentos-fastapi
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai_services:/app
      - ./shared_models:/app/models
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    restart: always

  node_ws:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: talentos-node-ws
    command: npm run dev
    volumes:
      - ./realtime:/app
    ports:
      - "4001:4001"
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

volumes:
  mongo_data:
  postgres_data:
  minio_data:
